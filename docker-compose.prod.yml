# =============================================================================
# Ariake · docker-compose.prod.yml — production override.
# Apply alongside the base file:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Differences from base:
#   - Frontend container removed (nginx on the host serves dist/ directly)
#   - PG NEVER publishes a port to the host
#   - Backend / AI-service publish only on 127.0.0.1 (nginx reverse-proxies)
#   - Logging driver capped to prevent runaway disk usage
# =============================================================================

services:

  postgres:
    # PG already not published in the base file; just ensure logs are bounded.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    ports:
      - "127.0.0.1:11451:11451"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      # In production the .env on the host is authoritative. We just enforce the
      # compose-only overrides here.
      GIN_MODE: release

  ai-service:
    ports:
      - "127.0.0.1:8000:8000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # No frontend service in prod — nginx on the host serves /var/www/blog/dist
  frontend:
    profiles: ["disabled"]
