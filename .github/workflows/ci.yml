name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-test:
    name: Backend Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/backend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        cache-dependency-path: apps/backend/go.sum

    - name: Verify dependencies
      run: go mod verify

    - name: Run Staticcheck
      uses: dominikh/staticcheck-action@v1.3.0
      with:
        version: "latest"
        working-directory: apps/backend
        install-go: false

    - name: Run Tests
      run: go test -v ./...

  frontend-check:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 10

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Lint
      run: pnpm lint:frontend

    - name: Build
      run: pnpm build:frontend

  mobile-check:
    name: Mobile Lint & Type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/mobile

    steps:
    - uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 10

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Lint
      run: pnpm lint

    - name: Type-check
      run: pnpm type-check

  ai-service-check:
    name: AI Service Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/ai-service

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        version: "latest"

    - name: Set up Python
      run: uv python install

    - name: Install dependencies
      run: uv sync --all-groups

    - name: Run Ruff
      run: uv run ruff check .

    - name: Run Tests
      run: uv run pytest

  full-check:
    name: Full Check Summary
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-check, mobile-check, ai-service-check]
    if: always()
    steps:
      - name: Check Status
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more checks failed or were cancelled."
            exit 1
          else
            echo "All checks passed successfully!"
          fi
