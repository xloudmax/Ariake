version: corpus_v3
packs:
  lightweight_structures:
    dedupe_by_normalized_title: true
    notes: >
      Dedupe duplicate records and keep lightweight-structure papers centered on
      transferable structural mechanics rather than placeholder duplicates.

  water_harvesting_desalination:
    dedupe_by_normalized_title: true
    notes: >
      Remove companion files, extracted figure placeholders, and similar non-paper
      records so water harvesting remains grounded in mechanism and fabrication papers.
    exclude_title_patterns:
      - supplementary material from
      - hydrophobic_rectangle from
      - data from
    exclude_keywords:
      - supplementary material
      - hydrophobic_rectangle

  reversible_adhesion:
    dedupe_by_normalized_title: true
    notes: >
      Keep mechanism-rich adhesion papers and dedupe alternate records with the same title.

  self_cleaning_antifouling:
    dedupe_by_normalized_title: true
    notes: >
      Remove placeholder/local-language companion records and keep mechanism-rich
      self-cleaning and anti-fouling surfaces.
    exclude_title_patterns:
      - 本文
    exclude_keywords:
      - 本文

  thermal_regulation_passive_cooling:
    dedupe_by_normalized_title: true
    notes: >
      Push thermal further toward biological heat exchange, insulation, and passive
      cooling mechanisms while pruning climate/ecology side paths and companion records.
    exclude_ids:
      - https://openalex.org/W4413421236
    exclude_title_patterns:
      - desalination
      - evaporator
      - water and energy sustainability
      - atmospheric stabilization
      - martian
      - shark spiral valve geometry
