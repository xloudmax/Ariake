schema: '../backend/graph/schema.graphql'
documents:
  - 'src/graphql/**/*.graphql'
generates:
  src/generated/graphql.ts:
    plugins:
      - 'typescript'
      - 'typescript-operations'
      - 'typescript-react-apollo'
    config:
      withHooks: true
      withHOC: false
      withComponent: false
      apolloReactHooksImportFrom: '@apollo/client'
      scalars:
        Time: 'string'
        Upload:
          input: '{ uri: string; name?: string; type?: string }'
          output: '{ uri: string; name?: string; type?: string }'
        Map: 'Record<string, unknown>'
        Any: 'unknown'
      skipTypename: false
      enumsAsTypes: true
      constEnums: true
      documentMode: 'documentNode'
      pureMagicComment: true
