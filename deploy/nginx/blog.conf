# =============================================================================
# Ariake · nginx (no Cloudflare in front)
# =============================================================================
# Use this when you terminate TLS directly on the VPS (Let's Encrypt or self-
# signed). For Cloudflare-fronted deployments use blog-cloudflare.conf instead.
#
# Symlinks:
#   ln -sf /var/www/blog/deploy/nginx/blog.conf /etc/nginx/sites-available/blog
#   ln -sf /etc/nginx/sites-available/blog /etc/nginx/sites-enabled/blog
#
# Replace `blog.example.com` with your real hostname before reloading nginx.
# =============================================================================

# ---------- Rate-limit zones ----------
# 100 req/s peaks for static, but only 10 r/s baseline for write-heavy GraphQL.
limit_req_zone $binary_remote_addr zone=static:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=api_read:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_write:10m rate=10r/s;

# ---------- HTTP -> HTTPS redirect ----------
server {
    listen 80;
    listen [::]:80;
    server_name blog.example.com;

    # ACME-challenge: keep an HTTP path for cert renewal.
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS ----------
server {
    listen 443 ssl;
    http2 on;
    listen [::]:443 ssl;
    server_name blog.example.com;

    # ----- TLS -----
    ssl_certificate     /etc/letsencrypt/live/blog.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blog.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ----- Security headers -----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # CSP intentionally permissive for now (AntD inline styles + Vite legacy chunks).
    # Tighten post-launch.
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval'" always;

    # ----- Body limits -----
    client_max_body_size 10M;

    # ----- Compression (static side) -----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/javascript application/json application/xml+rss image/svg+xml;
    gzip_comp_level 6;

    # ----- Logging -----
    access_log /var/log/nginx/blog_access.log;
    error_log  /var/log/nginx/blog_error.log warn;

    # ----- Frontend SPA -----
    root /var/www/blog/dist;
    index index.html;

    location / {
        limit_req zone=static burst=200 nodelay;
        try_files $uri $uri/ /index.html;
    }

    # Long-lived static assets get aggressive caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ----- GraphQL API -----
    location = /graphql {
        limit_req zone=api_read  burst=60 nodelay;
        # Mutations are POSTs; rate-limit them tighter via a separate zone:
        if ($request_method = POST) {
            set $rl_zone "api_write";
        }

        proxy_pass http://127.0.0.1:11451;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ----- Streaming graph endpoints (long timeout) -----
    location /graph/ {
        limit_req zone=api_read burst=30 nodelay;
        proxy_pass http://127.0.0.1:11451;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;          # SSE / streaming responses
        proxy_read_timeout 300s;      # GraphRAG can take a while
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
    }

    # ----- Health checks (no rate limit, no logs) -----
    location /health/ {
        proxy_pass http://127.0.0.1:11451;
        proxy_set_header Host $host;
        access_log off;
    }

    # ----- Uploads: small files, allow inline POSTs -----
    location /upload/ {
        limit_req zone=api_write burst=10 nodelay;
        proxy_pass http://127.0.0.1:11451;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        client_max_body_size 25M;
    }

    # ----- Uploaded asset serving -----
    location /uploads/ {
        alias /var/www/blog/apps/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }
}
