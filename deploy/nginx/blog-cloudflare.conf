# =============================================================================
# Ariake · nginx (Cloudflare in front)
# =============================================================================
# Use this when Cloudflare proxies traffic to your origin. Cloudflare handles
# TLS to the browser; this server can listen on plain HTTP (Cloudflare's
# "Flexible" mode) or HTTPS with a Cloudflare Origin CA cert ("Full (strict)",
# strongly recommended).
#
# Symlinks:
#   ln -sf /var/www/blog/deploy/nginx/blog-cloudflare.conf /etc/nginx/sites-available/blog
#   ln -sf /etc/nginx/sites-available/blog /etc/nginx/sites-enabled/blog
# =============================================================================

# ---------- Rate-limit zones ----------
limit_req_zone $http_cf_connecting_ip zone=cf_static:10m rate=100r/s;
limit_req_zone $http_cf_connecting_ip zone=cf_api_read:10m rate=30r/s;
limit_req_zone $http_cf_connecting_ip zone=cf_api_write:10m rate=10r/s;

server {
    # If Cloudflare connects via HTTPS (Full / Full (strict)), uncomment:
    # listen 443 ssl;
    # http2 on;
    # ssl_certificate     /etc/ssl/certs/cf-origin.pem;
    # ssl_certificate_key /etc/ssl/private/cf-origin.key;
    # ssl_protocols TLSv1.2 TLSv1.3;
    listen 80;
    server_name blog.example.com;

    # ----- Cloudflare real-IP unwrapping -----
    # Refresh from https://www.cloudflare.com/ips/ periodically.
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # ----- Security headers (Cloudflare adds HSTS in dashboard; keep these defensive) -----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval'" always;

    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_comp_level 6;

    access_log /var/log/nginx/blog_access.log;
    error_log  /var/log/nginx/blog_error.log warn;

    root /var/www/blog/dist;
    index index.html;

    location / {
        limit_req zone=cf_static burst=200 nodelay;
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /graphql {
        limit_req zone=cf_api_read burst=60 nodelay;
        proxy_pass http://127.0.0.1:11451;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header CF-Ray $http_cf_ray;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /graph/ {
        limit_req zone=cf_api_read burst=30 nodelay;
        proxy_pass http://127.0.0.1:11451;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
    }

    location /health/ {
        proxy_pass http://127.0.0.1:11451;
        proxy_set_header Host $host;
        access_log off;
    }

    location /upload/ {
        limit_req zone=cf_api_write burst=10 nodelay;
        proxy_pass http://127.0.0.1:11451;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_request_buffering off;
        client_max_body_size 25M;
    }

    location /uploads/ {
        alias /var/www/blog/apps/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }
}
